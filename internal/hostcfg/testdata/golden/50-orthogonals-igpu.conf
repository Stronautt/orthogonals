# written by orthogonals: pin desktop EGL to the iGPU so the session itself
# never holds the NVIDIA device nodes open (VM handover needs them free).
#
# Vulkan is deliberately NOT pinned: games, Proton and DXVK pick the discrete
# GPU on their own, so they work from any launch path with zero setup. The
# cost is that a process holding a Vulkan instance holds /dev/nvidia* while
# it runs — the gpu-detach gate refuses VM start and names it. Idle desktop
# apps that would trip that gate for nothing are handled by class:
#   - GTK4 defaults to its Vulkan renderer (GTK >= 4.18): GSK_RENDERER below
#     moves every GTK app (terminals, Files, ...) to GL, which the EGL pin
#     already routes to the iGPU. Only GTK reads the variable, so games and
#     anything launched from a terminal keep stock Vulkan.
#   - Chromium/Electron apps probe Vulkan regardless of toolkit: apply writes
#     desktop-entry overrides prefixing their Exec with VK_LOADER_DRIVERS_SELECT
#     set to the iGPU's Mesa driver — *intel* or *radeon* (list: igpuApps in
#     internal/hostcfg).
#
# TODO(refactor): this pin makes Wayland-native GL apps iGPU-only (the dGPU launch
# env does not override the EGL vendor list); revisit if a real app needs
# EGL on the dGPU.
__EGL_VENDOR_LIBRARY_FILENAMES=/usr/share/glvnd/egl_vendor.d/50_mesa.json
GSK_RENDERER=ngl
