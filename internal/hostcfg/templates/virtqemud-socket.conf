# written by orthogonals: with auth_unix_rw = "none" in virtqemud.conf, the
# socket permissions ARE the access control — so the socket must stop being
# world-writable (systemd ships it as 0666, relying on polkit to gate it).
# Membership of the libvirt group is now what grants access to the system
# hypervisor; everyone else is refused by the kernel, before libvirt sees them.
[Socket]
SocketMode=0660
SocketGroup=libvirt
