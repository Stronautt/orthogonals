# written by orthogonals: authenticate libvirt on the socket, not through polkit.
#
# The per-VM launcher connects to qemu:///system as the desktop user, and
# libvirt's default is to ask polkit. polkit (127) leaks a file descriptor per
# check, and once polkitd hits its 1024-fd soft limit it can no longer evaluate
# any rule — it then denies everything, and the one-click launch dies with
# "access denied by policy" for reasons that have nothing to do with the VM.
# A leaky daemon must not be able to break the launcher.
#
# So the libvirt group becomes the credential directly: the virtqemud.socket
# drop-in restricts the socket to root:libvirt 0660 (the default is 0666, wide
# open, with polkit as the only gate). Fedora's polkit rule already grants that
# same group unconditional access, so this is the identical trust boundary with
# one less moving part — and strictly tighter for everyone outside the group,
# who can no longer authenticate their way in with an admin password.
auth_unix_rw = "none"
