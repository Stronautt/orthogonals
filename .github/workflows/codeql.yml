name: CodeQL

# SAST with the extended query suite; findings land in the Security tab
# beside the govulncheck SARIF from ci.yml. Its own file because its runtime
# and cadence do not belong in the push gate.
on:
  push:
    branches: [main]

  pull_request:
  schedule:
    - cron: '41 4 * * 3' # weekly, offset from the regression crons

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version: stable
      - uses: github/codeql-action/init@v4
        with:
          languages: go
          build-mode: autobuild
          queries: security-extended
      - uses: github/codeql-action/analyze@v4
